<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>view</title>
</head>
<body>
<table border="1">
    <tr>
        <th>NO</th>
        <th>Name</th>
        <th>Total</th>
        <th>Percent</th>
        <th>Grade</th>
        <th>Status</th>
    </tr>

    {% for s in students %}
    <tr>
        <td>{{ loop.index }}
        <td>{{ s[1] }}</td>
        <td>{{ s[2] }}</td>
        <td>{{ s[3] }}</td>
        <td>{{ s[4] }}</td>
        <td>{{ s[5] }}</td>
    </tr>
    {% endfor %}
</table>
{% if students %}
    <!-- show table -->
{% else %}
    <h3>No data available</h3>
{% endif %}
<br>
<a href="/clear">
    <button>clear</button>
</a>
<br>

<a href="/add">
    <button>Add student</button>
</a>
</body>
</html>
